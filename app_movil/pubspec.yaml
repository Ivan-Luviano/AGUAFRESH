name: app_movil
description: "Aplicación móvil AGUAFRESH."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ==========================
  # FIREBASE
  # ==========================
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11

  # ==========================
  # GESTIÓN DE ESTADO
  # ==========================
  flutter_riverpod: ^2.6.1

  # ==========================
  # NAVEGACIÓN
  # ==========================
  go_router: ^16.0.0

  # ==========================
  # TIPOGRAFÍAS
  # ==========================
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Cuando agreguemos una fuente personalizada
  # la registraremos aquí.